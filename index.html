<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            margin: 0; padding: 0;
            background: #000 url('background.png') no-repeat center center fixed; 
            background-size: cover;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            overflow: hidden; color: white;
            display: flex; justify-content: center; align-items: center;
            height: 100vh;
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0) 0%, rgba(0,0,0,0.5) 100%);
            z-index: 1;
        }

        .main-container {
            position: relative; z-index: 2; text-align: center;
            /* DEĞİŞEN YER: İstediğin gibi tam olarak 750 piksel aşağı kaydırıldı */
            margin-top: 750px; 
        }

        /* Kırmızı Bloom Efektli Parlayan Yazı */
        #status {
            font-size: 28px; 
            font-weight: 200; 
            letter-spacing: 8px; 
            color: #ff0000;
            text-transform: uppercase;
            text-shadow: 0 0 10px #ff0000, 0 0 20px #800000, 0 0 30px #000;
            animation: pulse-red 2s infinite ease-in-out;
        }

        /* DEĞİŞEN YER: Altın Sarısı Bloom Efektli Yazı */
        #sub-text {
            margin-top: 15px;
            font-size: 14px;
            font-weight: 300;
            color: #ffd700; /* Altın Sarısı */
            letter-spacing: 6px;
            text-transform: uppercase;
            /* Altın Sarısı Bloom (Parlama) Efekti */
            text-shadow: 0 0 10px #ffd700, 0 0 20px #ff8c00, 0 0 30px #000;
            animation: pulse-gold 2s infinite ease-in-out;
        }

        /* Kırmızı yazı için nefes alma animasyonu */
        @keyframes pulse-red {
            0% { opacity: 0.8; text-shadow: 0 0 10px #ff0000; }
            50% { opacity: 1; text-shadow: 0 0 20px #ff0000, 0 0 40px #ff0000; }
            100% { opacity: 0.8; text-shadow: 0 0 10px #ff0000; }
        }

        /* Altın sarısı yazı için nefes alma animasyonu */
        @keyframes pulse-gold {
            0% { opacity: 0.8; text-shadow: 0 0 10px #ffd700; }
            50% { opacity: 1; text-shadow: 0 0 20px #ffd700, 0 0 40px #ff8c00; }
            100% { opacity: 0.8; text-shadow: 0 0 10px #ffd700; }
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    
    <div class="main-container">
        <div id="status">SUNUCUYA BAĞLANILIYOR</div>
        <div id="sub-text">BASO NETWORK - CITY ROLEPLAY</div>
    </div>

    <script type="text/javascript">
        var dots = 0;
        var baseText = "SUNUCUYA BAĞLANILIYOR";

        setInterval(function() {
            dots++;
            if (dots > 3) dots = 0;
            document.getElementById('status').innerHTML = baseText + ".".repeat(dots);
        }, 600);

        function SetStatusChanged(status) {}
    </script>
</body>
</html>
